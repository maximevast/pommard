# GoReleaser v2 — https://goreleaser.com
# Build & publish: push a tag `vX.Y.Z` and the release workflow runs this.
# Dry run locally: goreleaser release --snapshot --clean
version: 2

project_name: pommard

before:
  hooks:
    - go mod tidy

builds:
  - id: pommard
    main: .
    binary: pommard
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    # Must match the name install.sh reconstructs:
    #   pommard_<version>_<os>_<arch>.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: maximevast
    name: pommard
  draft: false
  prerelease: auto
  name_template: "pommard {{ .Tag }} 🍷"
